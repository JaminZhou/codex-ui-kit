name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    # Temporary while the repository is private; switch back to ubuntu-latest before public release.
    runs-on: [self-hosted, macOS, ARM64, codex-ui-kit]
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 11.7.0
      - uses: actions/setup-node@v7
        with:
          node-version: 22
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
