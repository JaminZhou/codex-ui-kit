name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    # Public pull requests must never execute untrusted code on a personal self-hosted runner.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 11.7.0
          dest: ${{ runner.temp }}/setup-pnpm
      - uses: actions/setup-node@v7
        with:
          node-version: 22
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
