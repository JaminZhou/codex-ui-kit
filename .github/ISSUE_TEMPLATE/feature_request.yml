name: Feature request
description: Propose a protocol-neutral component, state, or public API improvement.
title: "feat: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: Which coding-agent interaction cannot be expressed cleanly today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed public API or behavior
      description: Explain the component, states, accessibility semantics, and host-owned behavior.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe existing compositions or APIs you considered.
  - type: checkboxes
    id: boundaries
    attributes:
      label: Contribution boundaries
      options:
        - label: The proposal can be implemented without private source code or OpenAI brand assets.
          required: true
        - label: Protocol-specific transport and privileged actions remain host-owned.
          required: true
